<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กระดาษข้อสอบ: การแปลงหน่วยขั้นสูง</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap');

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #ffffff;
            color: #000000;
            max-width: 850px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 2px solid #000;
            padding-top: 10px;
        }
        .trick-box {
            background-color: #f8fafc;
            border: 1px dashed #cbd5e1;
            padding: 10px;
            text-align: center;
            font-size: 0.95em;
            color: #475569;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        
        /* --- Color Coding --- */
        .color-front { color: #db2777; font-weight: bold; } /* สีชมพู ตัวหน้า */
        .color-back { color: #0284c7; font-weight: bold; }  /* สีฟ้า ตัวหลัง */
        .color-base { color: #16a34a; font-weight: bold; }  /* สีเขียว เลขเดิม */
        .color-dim { color: #9333ea; font-weight: bold; }   /* สีม่วง มิติ/เลขยกกำลังของหน่วย */

        .question-list {
            font-size: 1.3em;
            line-height: 2;
        }
        .question-item {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px dotted #e2e8f0;
        }
        .q-main {
            display: flex;
            justify-content: flex-start;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .q-number { font-weight: bold; width: 40px; }
        .q-text { width: 250px; }
        .q-blank {
            border-bottom: 1px solid #000;
            width: 220px;
            margin: 0 15px;
            text-align: center;
            color: #000;
            font-weight: bold;
        }
        
        /* --- Detailed Explanation Box --- */
        .q-explain {
            margin-top: 10px;
            margin-left: 40px;
            background-color: #f8fafc;
            border-left: 4px solid #64748b;
            padding: 15px;
            font-size: 0.85em;
            color: #334155;
            border-radius: 0 8px 8px 0;
            line-height: 1.8;
        }
        
        /* ซ่อนเฉลยและวิธีคิด */
        .answer-hidden { display: none !important; }

        .controls {
            margin-top: 40px;
            text-align: center;
            border-top: 2px dashed #ccc;
            padding-top: 20px;
        }
        button.action-btn {
            font-family: 'Sarabun', sans-serif;
            font-size: 1.1em;
            padding: 10px 20px;
            margin: 0 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-generate { background-color: #3b82f6; color: white; }
        .btn-generate:hover { background-color: #2563eb; }
        .btn-answer { background-color: #e2e8f0; color: #334155; }
        .btn-answer:hover { background-color: #cbd5e1; }

        @media print {
            .no-print { display: none !important; }
            body { padding: 0; }
            .q-explain { display: none !important; }
            .q-blank { border-bottom: 1px solid #000; color: transparent !important; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>แบบทดสอบ: การแปลงหน่วยฟิสิกส์ (Unit Conversion)</h2>
        <div class="trick-box">
            <b>เทคนิคคิดลัด (สเต็ป 1-2-3-Bang!):</b> <span class="color-base">เลขชี้กำลังเดิม</span> + (<span class="color-front">ชี้กำลังตัวหน้า</span> &times; <span class="color-dim">มิติ</span>) - (<span class="color-back">ชี้กำลังตัวหลัง</span> &times; <span class="color-dim">มิติ</span>)
        </div>
    </div>

    <div class="question-list" id="worksheet">
        </div>

    <div class="controls no-print">
        <button class="action-btn btn-generate" onclick="generateWorksheet()">🔄 สุ่มโจทย์ชุดใหม่</button>
        <button class="action-btn btn-answer" onclick="toggleAnswers()" id="ans-btn">👀 ดูเฉลยและวิธีคิดอย่างละเอียด</button>
    </div>

<script>
    const prefixes = [
        { sym: 'T', name: 'เทระ', power: 12 },
        { sym: 'G', name: 'จิกะ', power: 9 },
        { sym: 'M', name: 'เมกะ', power: 6 },
        { sym: 'k', name: 'กิโล', power: 3 },
        { sym: 'h', name: 'เฮกโต', power: 2 },
        { sym: 'da', name: 'เดคา', power: 1 },
        { sym: '', name: 'หน่วยฐาน', power: 0 },
        { sym: 'd', name: 'เดซิ', power: -1 },
        { sym: 'c', name: 'เซนติ', power: -2 },
        { sym: 'm', name: 'มิลลิ', power: -3 },
        { sym: 'µ', name: 'ไมโคร', power: -6 },
        { sym: 'n', name: 'นาโน', power: -9 },
        { sym: 'p', name: 'พิโก', power: -12 }
    ];

    const baseUnits = ['m', 'g', 'A', 'Hz', 's', 'N', 'W'];
    
    // เพิ่มมิติของหน่วย (1 = ปกติ, 2 = พื้นที่, 3 = ปริมาตร)
    const dimensions = [
        { val: 1, sym: '' },
        { val: 2, sym: '²' },
        { val: 3, sym: '³' }
    ];

    let showingAnswers = false;

    const supMap = {'-': '⁻', '0': '⁰', '1': '¹', '2': '²', '3': '³', '4': '⁴', '5': '⁵', '6': '⁶', '7': '⁷', '8': '⁸', '9': '⁹'};
    function toSup(num) {
        return num.toString().split('').map(c => supMap[c] || c).join('');
    }

    function generateWorksheet() {
        const worksheet = document.getElementById('worksheet');
        worksheet.innerHTML = '';
        showingAnswers = false;
        document.getElementById('ans-btn').innerText = '👀 ดูเฉลยและวิธีคิดอย่างละเอียด';

        for(let i = 1; i <= 10; i++) {
            let unit = baseUnits[Math.floor(Math.random() * baseUnits.length)];
            let dim = dimensions[Math.floor(Math.random() * dimensions.length)];
            
            let pFrom = prefixes[Math.floor(Math.random() * prefixes.length)];
            let pTo = prefixes[Math.floor(Math.random() * prefixes.length)];
            
            while(pFrom.sym === pTo.sym) {
                pTo = prefixes[Math.floor(Math.random() * prefixes.length)];
            }

            let baseNum = Math.floor(Math.random() * 9) + 1;
            let startPow = Math.floor(Math.random() * 15) - 7; 
            
            // คำนวณแบบคูณมิติ
            let actualFromPow = pFrom.power * dim.val;
            let actualToPow = pTo.power * dim.val;
            let finalPow = startPow + actualFromPow - actualToPow;

            let row = document.createElement('div');
            row.className = 'question-item';

            // แสดงสีในโจทย์
            let pFromDisplay = pFrom.sym ? `<span class="color-front">${pFrom.sym}</span>` : '';
            let pToDisplay = pTo.sym ? `<span class="color-back">${pTo.sym}</span>` : '';
            let dimDisplay = dim.sym ? `<span class="color-dim">${dim.sym}</span>` : '';
            
            let qStr = `${baseNum} &times; 10<span class="color-base">${toSup(startPow)}</span> ${pFromDisplay}${unit}${dimDisplay}`;
            let ansStr = `${baseNum} &times; 10${toSup(finalPow)}`;

            // จัดฟอร์แมตอธิบาย
            let dimExplain = dim.val > 1 ? ` (คูณมิติยกกำลัง <span class="color-dim">${dim.val}</span>)` : ` (มิติปกติ = <span class="color-dim">1</span>)`;
            
            let mathExplain = ``;
            if (dim.val > 1) {
                mathExplain = `➔ ตั้งสมการคิดลัด: <span class="color-base">${startPow}</span> + (<span class="color-front">${pFrom.power}</span> &times; <span class="color-dim">${dim.val}</span>) - (<span class="color-back">${pTo.power}</span> &times; <span class="color-dim">${dim.val}</span>) <br>
                ➔ จะได้: <span class="color-base">${startPow}</span> + (<span class="color-front">${actualFromPow}</span>) - (<span class="color-back">${actualToPow}</span>) = <b>${finalPow}</b>`;
            } else {
                mathExplain = `➔ ตั้งสมการคิดลัด: <span class="color-base">${startPow}</span> + (<span class="color-front">${pFrom.power}</span>) - (<span class="color-back">${pTo.power}</span>) = <b>${finalPow}</b>`;
            }

            row.innerHTML = `
                <div class="q-main">
                    <div class="q-number">${i}.</div>
                    <div class="q-text">${qStr}</div>
                    <div>=</div>
                    <div class="q-blank"><span class="answer-text answer-hidden">${ansStr}</span></div>
                    <div style="font-weight: bold;">${pToDisplay}${unit}${dimDisplay}</div>
                </div>
                <div class="q-explain answer-text answer-hidden">
                    <b>ชำแหละที่มาของเลขชี้กำลัง (${finalPow}):</b><br>
                    • <span class="color-base">เลขชี้กำลังเดิม: ${startPow}</span><br>
                    • <span class="color-front">ตัวหน้า "${pFrom.name}": 10 ยกกำลัง ${pFrom.power}</span> ${dimExplain} ➔ นำมาบวกคือ <b>+${actualFromPow}</b><br>
                    • <span class="color-back">ตัวหลัง "${pTo.name}": 10 ยกกำลัง ${pTo.power}</span> ${dimExplain} ➔ นำมาลบคือ <b>-${actualToPow}</b><br>
                    <hr style="border: 0; border-top: 1px dashed #cbd5e1; margin: 8px 0;">
                    ${mathExplain}
                </div>
            `;
            
            worksheet.appendChild(row);
        }
    }

    function toggleAnswers() {
        showingAnswers = !showingAnswers;
        let elements = document.querySelectorAll('.answer-text');
        let btn = document.getElementById('ans-btn');
        
        elements.forEach(el => {
            if(showingAnswers) {
                el.classList.remove('answer-hidden');
            } else {
                el.classList.add('answer-hidden');
            }
        });

        btn.innerText = showingAnswers ? 'ซ่อนเฉลย' : '👀 ดูเฉลยและวิธีคิดอย่างละเอียด';
    }

    window.onload = generateWorksheet;
</script>

</body>
</html>
